{% extends 'base.html' %}

{% load i18n %}

{% block title %}{% trans "登录" %} - {% trans "个人信息管理系统" %}{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right" style="font-size: 3rem; color: #0f6674;"></i>
                    <h3 class="mt-3 mb-0">{% trans "用户登录" %}</h3>
                    <p class="text-muted">{% trans "请输入您的账号信息" %}</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">{% trans "用户名" %}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">{% trans "密码" %}</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>{% trans "登录" %}
                    </button>
                    <p class="text-center text-muted mb-0">
                        {% trans "还没有账号？" %}<a href="{% url 'register' %}" class="text-decoration-none">{% trans "立即注册" %}</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
